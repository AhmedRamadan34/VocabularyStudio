<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Vocabulary Studio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="container py-5">

    <div class="main-card">

        <h1 class="title">
            📚 Vocabulary Studio
        </h1>

        <p class="subtitle">
            Create Professional Vocabulary Videos
        </p>

        <hr>

        <table class="table align-middle" id="wordsTable">

            <thead>

                <tr>

                    <th>Word</th>
                    <th>Arabic</th>
                    <th>Image</th>
                    <th></th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>
                        <input type="text"
                               class="form-control word"
                               placeholder="Word">
                    </td>

                    <td>
                        <input type="text"
                               class="form-control arabic"
                               placeholder="Arabic">
                    </td>

                    <td>
                        <input type="file"
                               class="form-control image">
                    </td>

                    <td>
                        <button class="btn btn-danger deleteRow">
                            Delete
                        </button>
                    </td>

                </tr>

            </tbody>

        </table>

        <button
            class="btn btn-primary w-100 mb-4"
            id="addRow">

            + Add Word

        </button>

        <div class="row">

            <div class="col-md-6">

                <label>Signature</label>

                <input
                    id="signature"
                    class="form-control"
                    value="Soha Emad">

            </div>

            <div class="col-md-6">

                <label>Academy</label>

                <input
                    id="academy"
                    class="form-control"
                    placeholder="English City Academy">

            </div>

        </div>

        <div class="mt-3">

            <label>Logo</label>

            <input
                id="logo"
                type="file"
                class="form-control">

        </div>

        <div class="row mt-3">

            <div class="col-md-6">

                <label>Voice</label>

                <select
                    id="voice"
                    class="form-select">

                    <option value="en-US-JennyNeural">
                        Jenny (Female)
                    </option>

                    <option value="en-US-GuyNeural">
                        Guy (Male)
                    </option>

                    <option value="en-US-AriaNeural">
                        Aria
                    </option>

                    <option value="en-US-AndrewNeural">
                        Andrew
                    </option>

                </select>

            </div>

            <div class="col-md-6">

                <label>Speed</label>

                <select
                    id="speed"
                    class="form-select">

                    <option value="+0%">1x</option>
                    <option value="-25%">0.75x</option>
                    <option value="+25%">1.25x</option>
                    <option value="+50%">1.5x</option>

                </select>

            </div>

        </div>

        <div
            class="progress mt-4"
            id="progressBox"
            style="display:none;">

            <div
                id="progressBar"
                class="progress-bar progress-bar-striped progress-bar-animated"
                style="width:0%">

                0%

            </div>

        </div>

        <button
            id="generate"
            class="btn btn-success btn-lg w-100 mt-4">

            🎬 Generate Video

        </button>

    </div>

</div>

<script src="/static/js/script.js"></script>

</body>

</html>
